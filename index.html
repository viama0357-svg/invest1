<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid #333;
        }

        h2 {
            color: #4CAF50;
            margin-bottom: 10px;
        }

        .profit-box {
            background: linear-gradient(45deg, #1b5e20, #2e7d32);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .profit-amount {
            font-size: 2.2rem;
            font-weight: bold;
            display: block;
        }

        .label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        #welcome-message {
            margin-top: 20px;
            font-weight: bold;
            color: #81c784;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Account Overview</h2>
    
    <div class="profit-box">
        <span class="label">Total Profit</span>
        <span class="profit-amount">431,000k PHP</span>
    </div>

    <input type="text" id="userName" placeholder="Enter your name..." required>
    <button onclick="signIn()">SIGN IN</button>

    <div id="welcome-message"></div>
</div>

<script>
    function signIn() {
        const name = document.getElementById('userName').value;
        const messageDiv = document.getElementById('welcome-message');
        
        if (name.trim() !== "") {
            messageDiv.style.display = "block";
            messageDiv.innerHTML = "Welcome back, " + name + "!<br>Your funds are ready for withdrawal.";
            // You can add a redirect here if you want:
            // window.location.href = "https://yournextpage.com";
        } else {
            alert("Please enter a name first.");
        }
    }
</script>

</body>
</html>
